# Cameroon Geospatial Data Portal — full local stack.
# `docker compose up` boots: PostGIS, Redis, TiTiler, Martin, API, worker, frontend.
# Reads configuration from .env (copy .env.example -> .env first).

name: cameroon-geoportal

services:
  # ---------------------------------------------------------------- PostGIS DB
  db:
    image: postgis/postgis:16-3.4
    container_name: geoportal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geoportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-geoportal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/postgis/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geoportal} -d ${POSTGRES_DB:-geoportal}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------- Redis (Celery broker)
  redis:
    image: redis:7-alpine
    container_name: geoportal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------- FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: geoportal-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app
      - exports:/exports  # serve AOI export bundles (Phase 3b)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ----------------------------------------------- Celery processing worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: geoportal-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./worker:/app
      - ./ingest:/ingest
      - ./catalog:/app/catalog  # STAC catalog package, imported as `catalog.*`
      - exports:/exports
    command: celery -A worker.celery_app worker --loglevel=info

  # ---------------------------------------------- TiTiler (raster tiles/clip)
  titiler:
    image: ghcr.io/developmentseed/titiler:0.18.3
    container_name: geoportal-titiler
    restart: unless-stopped
    environment:
      PORT: 8000
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff,.cog"
      MOSAIC_CONCURRENCY: "1"
    volumes:
      # COGs live in the exports volume; titiler reads them as local files
      # (file:///exports/cogs/<id>.tif). When COGs move to R2, titiler reads by URL.
      - exports:/exports:ro
    ports:
      - "${TITILER_PORT:-8001}:8000"

  # ------------------------------------------- Martin (vector tiles from PostGIS)
  martin:
    image: ghcr.io/maplibre/martin:v0.13.0
    container_name: geoportal-martin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://geoportal:change_me_local_dev@db:5432/geoportal}
    ports:
      - "${MARTIN_PORT:-3000}:3000"
    command: ["--listen-addresses", "0.0.0.0:3000"]

  # ----------------------------------------------------- React + MapLibre frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geoportal-frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  db_data:
  exports:
